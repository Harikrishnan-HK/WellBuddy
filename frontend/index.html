<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WellBuddy" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>WellBuddy</title>
  </head>
  <body>
    <div id="root">
      <!-- Native-feel splash shown until React hydrates -->
      <div id="splash" style="position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:9999;">
        <div style="font-size:48px">🧘</div>
        <div style="color:#f1f5f9;font-size:22px;font-weight:700;font-family:-apple-system,sans-serif;">WellBuddy</div>
        <div style="width:32px;height:3px;background:#6366f1;border-radius:2px;animation:grow 1s ease-in-out infinite alternate"></div>
      </div>
      <style>#splash{transition:opacity .3s} @keyframes grow{from{width:20px}to{width:48px}}</style>
    </div>
    <script>
      // Fade out splash once React renders
      window.__hideSplash = () => {
        const s = document.getElementById('splash');
        if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 300); }
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
